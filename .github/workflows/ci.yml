name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check SimpleDoc
        run: npx -y @simpledoc/simpledoc check

      - name: Validate captured UX evidence
        run: |
          python3 captures/ghzoom-pr-81834/capture_ghzoom.py --validate-only
          python3 captures/ghzoom-pr-81834/capture_ghzoom.py \
            --root captures/ghzoom-issue-88499 \
            --mode issue \
            --validate-only
