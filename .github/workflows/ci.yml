name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate install commands
        run: scripts/verify-install.sh

      - name: Check SimpleDoc
        run: npx -y @simpledoc/simpledoc check

      - name: Reject PNG capture artifacts
        run: scripts/verify-no-png-captures.sh

      - name: Validate captured UX evidence
        run: |
          python3 captures/ghzinga-pr-81834/capture_ghzinga.py --validate-only
          python3 captures/ghzinga-pr-81834/capture_ghzinga.py \
            --root captures/ghzinga-issue-88499 \
            --mode issue \
            --validate-only
          python3 captures/ghzinga-pr-81834/capture_mouse_smoke.py --self-test
          python3 captures/ghzinga-pr-81834/capture_mouse_smoke.py --validate-only
