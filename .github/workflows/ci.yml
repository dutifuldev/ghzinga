name: ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - Cargo.lock
      - Cargo.toml
      - slophammer.yml
      - fixtures/**
      - captures/**
      - scripts/**
      - src/**
      - tests/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - Cargo.lock
      - Cargo.toml
      - slophammer.yml
      - fixtures/**
      - captures/**
      - scripts/**
      - src/**
      - tests/**

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Rust quality tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
          cargo install cargo-audit --locked
          cargo install cargo-mutants --locked
          cargo install --git https://github.com/dutifuldev/slophammer \
            --rev 5586beee32c3f2d692ccf4fb80422cd7bb683c80 \
            slophammer-rs \
            --locked

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run local CI gate
        run: scripts/ci-local.sh
